<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Register for Course – Student Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-warning fw-bold fs-5">📝 Register Student for Course</div>
                <div class="card-body">
                    <form th:action="@{/registrations/register}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Student</label>
                            <select name="studentId" class="form-select" required>
                                <option value="">-- Select Student --</option>
                                <option th:each="s : ${students}"
                                        th:value="${s.id}"
                                        th:text="${s.fullName} + ' (Year ' + ${s.year} + ')'"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Course</label>
                            <select name="courseId" class="form-select" required>
                                <option value="">-- Select Course --</option>
                                <option th:each="c : ${courses}"
                                        th:value="${c.id}"
                                        th:text="${c.courseCode} + ' – ' + ${c.courseName}"></option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Semester</label>
                            <select name="semester" class="form-select" required>
                                <option value="">-- Select Semester --</option>
                                <option th:each="sem : ${semesters}" th:value="${sem}" th:text="${sem}"></option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning fw-bold">✅ Register</button>
                            <a th:href="@{/}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
