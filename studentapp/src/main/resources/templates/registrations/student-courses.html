<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${student.fullName} + ' – Courses'">Student Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">
            📚 Courses for <span th:text="${student.fullName}"></span>
        </h2>
        <div class="d-flex gap-2">
            <a th:href="@{/registrations/register}" class="btn btn-warning">+ Register Course</a>
            <a th:href="@{/students/{id}/profile(id=${student.id})}" class="btn btn-outline-secondary">← Profile</a>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Course Name</th>
                        <th>Code</th>
                        <th>Instructor</th>
                        <th>Semester</th>
                        <th>Credits</th>
                        <th class="text-center">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(registrations)}">
                        <td colspan="7" class="text-center text-muted py-4">No courses registered yet.</td>
                    </tr>
                    <tr th:each="reg, iter : ${registrations}">
                        <td th:text="${iter.count}"></td>
                        <td class="fw-semibold" th:text="${reg.course.courseName}"></td>
                        <td><span class="badge bg-secondary" th:text="${reg.course.courseCode}"></span></td>
                        <td th:text="${reg.course.lecturer}"></td>
                        <td th:text="${reg.semester}"></td>
                        <td th:text="${reg.course.credits}"></td>
                        <td class="text-center">
                            <form th:action="@{/registrations/{id}/drop(id=${reg.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Drop this course?')">
                                <input type="hidden" name="studentId" th:value="${student.id}"/>
                                <button type="submit" class="btn btn-sm btn-outline-danger">Drop</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
