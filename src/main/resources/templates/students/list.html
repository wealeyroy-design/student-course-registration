<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Students – Student Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-5">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">👩‍🎓 Students</h2>
        <a th:href="@{/students/new}" class="btn btn-primary">+ Add Student</a>
    </div>
    <div class="card shadow">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Program</th>
                        <th>Year</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(students)}">
                        <td colspan="6" class="text-center text-muted py-4">No students found. Add one!</td>
                    </tr>
                    <tr th:each="student : ${students}">
                        <td class="text-muted small" th:text="${student.id}"></td>
                        <td>
                            <a th:href="@{/students/{id}/profile(id=${student.id})}"
                               th:text="${student.fullName}" class="fw-semibold text-decoration-none"></a>
                        </td>
                        <td th:text="${student.email}"></td>
                        <td th:text="${student.program}"></td>
                        <td><span class="badge bg-info text-dark" th:text="'Year ' + ${student.year}"></span></td>
                        <td class="text-center">
                            <a th:href="@{/students/{id}/profile(id=${student.id})}" class="btn btn-sm btn-outline-secondary me-1">Profile</a>
                            <a th:href="@{/students/{id}/edit(id=${student.id})}" class="btn btn-sm btn-outline-primary me-1">Edit</a>
                            <form th:action="@{/students/{id}/delete(id=${student.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Delete this student and all their registrations?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
