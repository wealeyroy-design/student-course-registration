<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${student.fullName} + ' – Profile'">Student Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-5">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card shadow text-center">
                <div class="card-body py-4">
                    <div class="display-1 mb-3">👩‍🎓</div>
                    <h3 class="fw-bold" th:text="${student.fullName}"></h3>
                    <p class="text-muted mb-1" th:text="${student.email}"></p>
                    <p class="text-muted mb-2" th:text="${student.program}"></p>
                    <span class="badge bg-primary me-1" th:text="'Year ' + ${student.year}"></span>
                </div>
                <div class="card-footer">
                    <table class="table table-sm mb-0 text-start">
                        <tr>
                            <td class="text-muted">Student ID</td>
                            <td class="fw-semibold" th:text="${student.id}"></td>
                        </tr>
                        <tr>
                            <td class="text-muted">Program</td>
                            <td class="fw-semibold" th:text="${student.program}"></td>
                        </tr>
                        <tr>
                            <td class="text-muted">Year</td>
                            <td class="fw-semibold" th:text="${student.year}"></td>
                        </tr>
                        <tr>
                            <td class="text-muted">Email</td>
                            <td class="fw-semibold" th:text="${student.email}"></td>
                        </tr>
                    </table>
                </div>
                <div class="card-footer d-flex gap-2 justify-content-center">
                    <a th:href="@{/students/{id}/edit(id=${student.id})}" class="btn btn-outline-primary btn-sm">Edit</a>
                    <a th:href="@{/registrations/register}" class="btn btn-outline-success btn-sm">+ Register</a>
                    <a th:href="@{/students}" class="btn btn-outline-secondary btn-sm">Back</a>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-white fw-bold d-flex justify-content-between align-items-center">
                    <span>📚 Registered Courses</span>
                    <a th:href="@{/registrations/student/{id}(id=${student.id})}" class="btn btn-sm btn-outline-primary">Manage</a>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr><th>Course</th><th>Code</th><th>Semester</th><th>Credits</th></tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(student.registrations)}">
                                <td colspan="4" class="text-center text-muted py-4">No courses registered yet.</td>
                            </tr>
                            <tr th:each="reg : ${student.registrations}">
                                <td th:text="${reg.course.courseName}"></td>
                                <td><span class="badge bg-secondary" th:text="${reg.course.courseCode}"></span></td>
                                <td th:text="${reg.semester}"></td>
                                <td th:text="${reg.course.credits}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
