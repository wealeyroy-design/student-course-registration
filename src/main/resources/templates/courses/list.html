<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Courses – Student Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-5">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">📚 Courses</h2>
        <a th:href="@{/courses/new}" class="btn btn-success">+ Add Course</a>
    </div>
    <div class="card shadow">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Course Name</th>
                        <th>Code</th>
                        <th>Lecturer</th>
                        <th>Credits</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(courses)}">
                        <td colspan="6" class="text-center text-muted py-4">No courses found. Add one!</td>
                    </tr>
                    <tr th:each="course : ${courses}">
                        <td class="text-muted small" th:text="${course.id}"></td>
                        <td class="fw-semibold" th:text="${course.courseName}"></td>
                        <td><span class="badge bg-secondary" th:text="${course.courseCode}"></span></td>
                        <td th:text="${course.lecturer}"></td>
                        <td><span class="badge bg-info text-dark" th:text="${course.credits} + ' cr'"></span></td>
                        <td class="text-center">
                            <a th:href="@{/courses/{id}/edit(id=${course.id})}" class="btn btn-sm btn-outline-primary me-1">Edit</a>
                            <form th:action="@{/courses/{id}/delete(id=${course.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Delete this course and all its registrations?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
